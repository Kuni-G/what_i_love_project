<section style="max-width: 600px; margin: 50px auto;">

    <form action="#">
        <label>Name:</label><br>
        <input type="text" required><br><br>

        <label>Project Budget (Range):</label><br>
        <input type="range" min="1000" max="10000"><br><br>

        <label>Project Type:</label><br>

        <label>Requirements:</label><br>

        <input type="submit" value="Send Message">
